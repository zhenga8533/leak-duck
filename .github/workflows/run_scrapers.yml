name: Scrape Leek Duck Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: leak-duck-data-publisher
  cancel-in-progress: false

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      LEAK_DUCK_OUTPUT_DIR: ${{ runner.temp }}/leak-duck-data

    steps:
      - name: Check out main branch for code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regression tests
        run: python -m unittest discover -v

      - name: Run archiver and scrapers
        run: python -m src.main

      - name: Commit and push JSON to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp .github/data-branch-readme.md "$LEAK_DUCK_OUTPUT_DIR/README.md"
          git fetch origin data
          git checkout -B data origin/data

          cp "$LEAK_DUCK_OUTPUT_DIR/README.md" README.md
          cp "$LEAK_DUCK_OUTPUT_DIR"/*.json .
          if [ -d "$LEAK_DUCK_OUTPUT_DIR/archives" ]; then
            mkdir -p archives
            cp -R "$LEAK_DUCK_OUTPUT_DIR/archives/." archives/
          fi

          git add -- README.md '*.json'
          if [ -d archives ]; then
            git add -- archives/
          fi

          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Automated data update"
            git push origin data
          fi
